<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>LAPD - Archives Criminelles</title>
    <style>
        :root { --lapd-blue: #0A1931; --lapd-gold: #D4AF37; --bg: #121212; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #E0E0E0; margin: 0; }
        header { background: var(--lapd-blue); padding: 20px; text-align: center; border-bottom: 3px solid var(--lapd-gold); }
        header h1 { color: white; margin: 0; text-transform: uppercase; }
        nav { display: flex; justify-content: center; background: #000; padding: 10px; }
        nav a { color: white; text-decoration: none; padding: 10px 20px; margin: 0 5px; border-radius: 4px; border: 1px solid transparent; }
        nav a:hover, nav a.active { background: var(--lapd-blue); border-color: var(--lapd-gold); color: var(--lapd-gold); }
        main { padding: 30px; max-width: 1000px; margin: 0 auto; }
        
        table { width: 100%; border-collapse: collapse; background: #1E1E1E; border-radius: 8px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #333; }
        th { background: #000; color: var(--lapd-gold); text-transform: uppercase; font-size: 13px; }
        tbody tr { cursor: pointer; transition: 0.2s; }
        tbody tr:hover { background: #2A2A2A; }

        /* MODALE */
        .modal { display: none; position: fixed; z-index: 10; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(5px); }
        .modal-content { background: #1a1a1a; margin: 5% auto; padding: 30px; width: 80%; max-width: 800px; border: 1px solid var(--lapd-gold); border-radius: 8px; position: relative; }
        .close { position: absolute; right: 20px; top: 10px; color: #666; font-size: 30px; cursor: pointer; }
        .close:hover { color: white; }

        .flex-modal { display: flex; gap: 30px; margin-top: 20px; }
        .modal-photo { flex: 1; text-align: center; }
        .modal-photo img { max-width: 100%; border: 2px solid #333; border-radius: 4px; }
        .modal-infos { flex: 2; }
        .info-box { margin-bottom: 15px; border-bottom: 1px solid #2a2a2a; padding-bottom: 5px; }
        .label { color: var(--lapd-gold); font-size: 12px; font-weight: bold; text-transform: uppercase; }
        .val { font-size: 18px; }

        .btn-delete { background: #b71c1c; color: white; border: none; padding: 12px 20px; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 20px; width: 100%; }
        .btn-delete:hover { background: #f44336; }
    </style>
</head>
<body>

<header>
    <h1>Los Angeles Police Department</h1>
    <p style="color:var(--lapd-gold); margin:5px 0 0 0;">BASE DE DONNÉES CENTRALE</p>
</header>

<nav>
    <a href="index.html">Nouvelle Saisie</a>
    <a href="casier.html" class="active">Base de Données</a>
</nav>

<main>
    <table>
        <thead>
            <tr>
                <th>Nom</th>
                <th>Prénom</th>
                <th>Naissance</th>
                <th>Date du Crime</th>
            </tr>
        </thead>
        <tbody id="table-body">
            <tr><td colspan="4" style="text-align:center;">Chargement des archives...</td></tr>
        </tbody>
    </table>
</main>

<div id="myModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h2 style="margin-top:0; border-bottom: 1px solid var(--lapd-gold); padding-bottom:10px;">Dossier Judiciaire</h2>
        <div class="flex-modal">
            <div class="modal-photo">
                <img id="m-photo" src="" alt="Mugshot">
            </div>
            <div class="modal-infos">
                <div class="info-box"><div class="label">Identité</div><div class="val"><span id="m-nom"></span> <span id="m-prenom"></span></div></div>
                <div class="info-box"><div class="label">Né(e) le</div><div class="val" id="m-naissance"></div></div>
                <div class="info-box"><div class="label">Date du délit</div><div class="val" id="m-date"></div></div>
                <div class="info-box"><div class="label">Motifs / Crimes</div><div class="val" id="m-motif" style="font-size:15px; background:#222; padding:10px; border-radius:4px; margin-top:5px;"></div></div>
                <div class="info-box"><div class="label">Peine</div><div class="val" id="m-peine" style="color:#f44336; font-weight:bold;"></div></div>
                
                <button class="btn-delete" id="delete-btn">🗑️ SUPPRIMER CE CASIER DÉFINITIVEMENT</button>
            </div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

<script>
    // ⚠️ À REMPLACER PAR TES INFOS (LES MÊMES QUE INDEX.HTML)
    const firebaseConfig = {
        apiKey: "AIzaSyDBrDH5B7_V8GzNpidNePIS3P9YoWgi72g",
        authDomain: "lnpd-intranet.firebaseapp.com",
        projectId: "lnpd-intranet",
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    
    let dossiersCache = {};
    let currentId = null;

    const tbody = document.getElementById('table-body');
    const modal = document.getElementById('myModal');
    const closeBtn = document.querySelector('.close');

    // 1. Écoute en temps réel et Tri par Nom
    db.collection("casiers").orderBy("nom").onSnapshot((snapshot) => {
        tbody.innerHTML = "";
        dossiersCache = {};
        if(snapshot.empty) {
            tbody.innerHTML = "<tr><td colspan='4' style='text-align:center;'>Aucun casier en base.</td></tr>";
            return;
        }
        snapshot.forEach(doc => {
            const d = doc.data();
            dossiersCache[doc.id] = d;
            const tr = document.createElement('tr');
            tr.onclick = () => openModal(doc.id);
            tr.innerHTML = `<td><strong>${d.nom}</strong></td><td>${d.prenom}</td><td>${d.naissance}</td><td>${d.dateCrime}</td>`;
            tbody.appendChild(tr);
        });
    });

    // 2. Fonctions Modale
    function openModal(id) {
        currentId = id;
        const d = dossiersCache[id];
        document.getElementById('m-nom').innerText = d.nom;
        document.getElementById('m-prenom').innerText = d.prenom;
        document.getElementById('m-naissance').innerText = d.naissance;
        document.getElementById('m-date').innerText = d.dateCrime;
        document.getElementById('m-motif').innerText = d.motif;
        document.getElementById('m-peine').innerText = d.peine;
        document.getElementById('m-photo').src = d.photoUrl || "https://via.placeholder.com/250x300?text=PAS+DE+PHOTO";
        modal.style.display = "block";
    }

    closeBtn.onclick = () => modal.style.display = "none";
    window.onclick = (e) => { if(e.target == modal) modal.style.display = "none"; }

    // 3. Suppression
    document.getElementById('delete-btn').onclick = async () => {
        if(!currentId) return;
        if(confirm("Confirmez-vous la suppression définitive de ce casier judiciaire ?")) {
            try {
                await db.collection("casiers").doc(currentId).delete();
                modal.style.display = "none";
                alert("Dossier supprimé.");
            } catch(err) {
                alert("Erreur lors de la suppression.");
            }
        }
    };
</script>
</body>
</html>
